<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Read Page Sidebar</title>
  <link rel="stylesheet" href="sidebar.css">
</head>

<body>
  <div class="sidebar-container">

    <!-- Left Icon Strip -->
    <div class="icon-strip">
      <div class="icon-button add-ext-btn" data-view="add-extension" title="Add Extension">+</div>
      <div class="icon-button active" data-view="read-page" title="Page Properties">📄</div>
      <div id="extensions-container"></div>
    </div>

    <!-- Right Main Content -->
    <div class="main-content">

      <div class="header" id="contentHeader">
        <h3>Page Properties</h3>
        <div class="header-actions">
          <button class="flowActionBTN refresh" id="refreshPageBtn">⟲</button>
        </div>
      </div>

      <!-- CONTENT WRAPPER (Now flex-based) -->
      <div class="content">

        <!-- Read Page View -->
        <div class="content-view active" data-view="read-page">
          <div class="ext-scroll-area">

            <div class="section">
              <h4>📞 Phone Numbers</h4>
              <ul id="phones">
                <li>No phones found</li>
              </ul>
            </div>

            <div class="section">
              <h4>📧 Email Addresses</h4>
              <ul id="emails">
                <li>No emails found</li>
              </ul>
            </div>

            <div class="info-box">
              <p>💡 Data from this page will be sent to any extension you trigger below.</p>
            </div>

          </div>
        </div>

        <!-- Add Extension View -->
        <div class="content-view" data-view="add-extension">
        </div>

        <!-- Dynamic Extension Views -->
        <div id="dynamic-views-container" class="extContainer"></div>

      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div id="delete-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Delete Extension</h2>
        <button class="modal-close">×</button>
      </div>
      <p id="delete-message" style="padding: 20px; text-align: center; color: #666;">
        Are you sure?
      </p>
      <div class="form-actions" style="padding: 0 20px 20px;">
        <button id="confirm-delete" class="btn-primary">Delete</button>
        <button type="button" class="btn-secondary modal-close">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module" src="Form/flowForm.js"></script>
  <script type="module" src="sidebar.js"></script>
</body>

</html>
